name: Build RaRa Cafe Karaoke APK

on:
  # Otomatis build setiap kali ada perubahan di GitHub
  push:
    branches: [ main, master ]
  # Bisa juga di-trigger manual dari tab Actions di GitHub
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. Ambil kode dari repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java (dibutuhkan Android build)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      # 4. Download semua dependencies Flutter
      - name: Install Flutter dependencies
        run: flutter pub get

      # 5. Periksa kode (opsional tapi bagus)
      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # 6. Build APK release
      - name: Build APK
        run: flutter build apk --release --split-per-abi

      # 7. Juga build APK universal (satu file untuk semua perangkat)
      - name: Build APK Universal
        run: flutter build apk --release

      # 8. Upload hasil build sebagai artifact (bisa didownload)
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RaRa-Cafe-Karaoke-APK
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30

      # 9. Buat GitHub Release otomatis (dengan tag versi)
      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
          name: RaRa Cafe Karaoke ${{ github.ref_name }}
          body: |
            ## 🎤 RaRa Cafe Karaoke
            
            ### File APK:
            - `app-release.apk` → Universal (semua perangkat Android & Android TV)
            
            ### Cara Install:
            1. Download file `app-release.apk`
            2. Di HP: aktifkan "Install dari sumber tidak dikenal" di Pengaturan
            3. Buka file APK → Install
            4. Selesai! 🎉
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
